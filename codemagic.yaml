# Builds the Capacitor app on a cloud Mac and uploads it to TestFlight.
# Uses a STABLE signing key stored in Codemagic env var CERTIFICATE_PRIVATE_KEY
# (variable group "ios_signing"), so the same certificate is reused every build.
workflows:
  ios-bounce:
    name: Bounce iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key NAME you added in Codemagic.
      app_store_connect: BounceASCKey
    environment:
      groups:
        - ios_signing            # must contain CERTIFICATE_PRIVATE_KEY (secure)
      vars:
        BUNDLE_ID: "com.austinv.bounce"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the native iOS project
        script: |
          set -e
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
          npx cap sync ios
          ls -la ios/App/Podfile
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files (creates cert + profile if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Apply signing profiles
        script: xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Auto build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s)/60)) || true
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
