# Builds the Capacitor app on a cloud Mac and uploads it to TestFlight.
# Signing key is stored base64 in env var CERT_KEY_B64 (group "ios_signing").
workflows:
  ios-bounce:
    name: Bounce iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key NAME you added in Codemagic.
      app_store_connect: BounceASCKey
    environment:
      groups:
        - ios_signing            # must contain CERT_KEY_B64 (secure)
      vars:
        BUNDLE_ID: "com.austinv.bounce"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the native iOS project
        script: |
          set -e
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
          npx cap sync ios
          ls -la ios/App/Podfile
      - name: Force the bundle identifier on the App target
        script: |
          cd ios/App
          echo "Bundle IDs before:"; grep PRODUCT_BUNDLE_IDENTIFIER App.xcodeproj/project.pbxproj | sort -u
          sed -i '' -E 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.austinv.bounce;/g' App.xcodeproj/project.pbxproj
          echo "Bundle IDs after:"; grep PRODUCT_BUNDLE_IDENTIFIER App.xcodeproj/project.pbxproj | sort -u
      - name: Set the home-screen display name
        script: |
          PL="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Ball Ups" "$PL" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Ball Ups" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PL" || true
      - name: Lock orientation to portrait
        script: |
          PL="ios/App/App/Info.plist"
          # Opt out of iPad multitasking so portrait-only passes App Store validation
          /usr/libexec/PlistBuddy -c "Delete :UIRequiresFullScreen" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PL" 2>/dev/null || true
          # iPhone: portrait only
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PL" 2>/dev/null || true
          # iPad: portrait only
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PL" 2>/dev/null || true
          echo "Orientations now:"; /usr/libexec/PlistBuddy -c "Print :UISupportedInterfaceOrientations" "$PL" || true
          echo "RequiresFullScreen:"; /usr/libexec/PlistBuddy -c "Print :UIRequiresFullScreen" "$PL" || true
      - name: Configure AdMob (App ID, ATT prompt, SKAdNetwork)
        script: |
          PL="ios/App/App/Info.plist"
          # AdMob application ID — REQUIRED, the Google Mobile Ads SDK refuses to initialize without it
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-4649237019468201~7012889654" "$PL"
          # App Tracking Transparency prompt text — REQUIRED for requestTrackingAuthorization()
          /usr/libexec/PlistBuddy -c "Delete :NSUserTrackingUsageDescription" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string This lets us show ads that are more relevant to you. You can remove ads anytime in the shop." "$PL"
          # SKAdNetwork IDs for ad attribution (NOT required for approval). Paste Google's full current
          # list from their AdMob docs for best attribution; a common subset is included below.
          /usr/libexec/PlistBuddy -c "Delete :SKAdNetworkItems" "$PL" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :SKAdNetworkItems array" "$PL"
          i=0
          for NET in cstr6suwn9 4fzdc2evr5 2fnua5tdw4 ydx93a7ass 5a6flpkh64 p78axxw29g v72qych5uu ludvb6z3bs cp8zw746q7 c6k4g5qg8m 3qy4746246 hs6bdukanm wzmmz9fp6w yclnxrl5pm t38b2kh725 7ug5zh24hu gta9lk7p23 vutu7akeur 9t245vhmpl 22mmun2rn5 4468km3ulz 2u9pt9hc89 klf5c3l5u5 ppxm28t8ap ecpz2srf59 uw77j35x4d pwa73g5rt2 mlmmfzh3r3 578prtvx9j 4dzt52r2t5 e5fvkxwrpn 8c4e2ghe7u zq492l623r 3rd42ekr43; do
            /usr/libexec/PlistBuddy -c "Add :SKAdNetworkItems:$i dict" "$PL"
            /usr/libexec/PlistBuddy -c "Add :SKAdNetworkItems:$i:SKAdNetworkIdentifier string ${NET}.skadnetwork" "$PL"
            i=$((i+1))
          done
          echo "GADApplicationIdentifier:"; /usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" "$PL" || true
          echo "SKAdNetworkItems added: $i"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Decode signing key
        script: |
          echo "$CERT_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          echo "Key starts with:" && head -1 /tmp/cert_key.pem
      - name: Fetch signing files (creates cert + profile if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Apply signing profiles
        script: xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Auto build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s)/60)) || true
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
