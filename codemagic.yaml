# Builds the Capacitor app on a cloud Mac and uploads it to TestFlight.
# Explicit CLI signing: creates the certificate + profile if they don't exist.
workflows:
  ios-bounce:
    name: Bounce iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key NAME you added in Codemagic.
      app_store_connect: BounceASCKey
    environment:
      vars:
        BUNDLE_ID: "com.austinv.bounce"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the native iOS project
        script: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files (creates cert + profile if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Apply signing profiles
        script: xcode-project use-profiles
      - name: Auto build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s)/60)) || true
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
