# Builds the Capacitor app on a cloud Mac and uploads it to TestFlight.
# The signing key is stored base64-encoded in env var CERT_KEY_B64 (group
# "ios_signing") so it pastes as a single line, then decoded during the build.
workflows:
  ios-bounce:
    name: Bounce iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BounceASCKey
    environment:
      groups:
        - ios_signing            # must contain CERT_KEY_B64 (secure)
      vars:
        BUNDLE_ID: "com.austinv.bounce"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate the native iOS project
        script: |
          set -e
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
          npx cap sync ios
          ls -la ios/App/Podfile
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Decode signing key
        script: |
          echo "$CERT_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          echo "Key starts with:" && head -1 /tmp/cert_key.pem
      - name: Fetch signing files (creates cert + profile if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificate to keychain
        script: keychain add-certificates
      - name: Apply signing profiles
        script: xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Auto build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s)/60)) || true
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
