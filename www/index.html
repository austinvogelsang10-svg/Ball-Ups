<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0b1a">
<title>Cube Bounce</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#0b0b1a; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         touch-action:none; user-select:none; -webkit-user-select:none; color:#fff; }
  #c { display:block; width:100vw; height:100vh; }
  .ui { position:fixed; left:0; right:0; text-align:center; pointer-events:none; z-index:3; }
  #score { top:max(6vh,38px); font-size:14vmin; font-weight:700; letter-spacing:-.02em;
           text-shadow:0 0 24px rgba(80,240,255,.55); transition:transform .09s ease; }
  #center { top:0; bottom:0; display:flex; flex-direction:column; align-items:center;
            justify-content:center; gap:10px; padding:0 8vw; }
  #center h1 { font-size:13vmin; font-weight:800; letter-spacing:-.03em;
               background:linear-gradient(90deg,#ff3d8b,#3df0ff); -webkit-background-clip:text;
               background-clip:text; color:transparent; }
  #center p { font-size:4.4vmin; font-weight:500; opacity:.85; }
  #center .big { font-size:18vmin; font-weight:800; line-height:1;
                 text-shadow:0 0 30px rgba(255,61,139,.5); }
  #center .small { font-size:4vmin; opacity:.7; }
  .pill { margin-top:14px; padding:.7em 1.7em; border-radius:999px; font-weight:700; font-size:4.6vmin;
          color:#0b0b1a; background:linear-gradient(90deg,#ff5ba0,#46e8ff);
          box-shadow:0 8px 30px rgba(70,232,255,.35); }
  #over { display:none; }
  #mute { position:fixed; top:max(14px,env(safe-area-inset-top)); right:16px; width:40px; height:40px;
          border:none; border-radius:50%; background:rgba(255,255,255,.12); color:#fff; font-size:18px;
          display:grid; place-items:center; cursor:pointer; z-index:5; backdrop-filter:blur(6px); }
  #mute:active{ transform:scale(.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score" class="ui" style="display:none">0</div>
<div id="start" class="ui">
  <div id="center"><h1>Cube&nbsp;Bounce</h1><p>Slide to move your ball · keep the small one off the floor</p><div class="pill">Tap to play</div></div>
</div>
<div id="over" class="ui">
  <div id="center"><h1 style="font-size:9vmin">Game Over</h1>
    <div class="big" id="finalScore">0</div>
    <div class="small" id="bestScore">Best 0</div>
    <div class="pill">Tap to retry</div></div>
</div>
<button id="mute" aria-label="Toggle sound">&#9834;</button>

<script src="./three.min.js"></script>
<script>
(() => {
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PLAYER_COLOR = 0xff3d8b, BALL_COLOR = 0x3df0ff, EDGE_COLOR = 0x9fb4ff;

  // play volume
  const HW = 3.0, CUBE_H = 6.0;       // half-width of cube footprint, cube height
  const PR = 0.72, SR = 0.46;         // player radius, small-ball radius
  const G = 22;                       // gravity
  const E = 1.0;                      // restitution off player
  const WALL_E = 0.92;                // restitution off walls
  const MINUP = 12.5;                 // minimum upward speed on a save
  const MAXSPD = 44;

  // ---------- renderer / scene / camera ----------
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2.5));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 200);
  const BASE = { y: 6.6, z: 12.4, look: 2.6 };
  camera.position.set(0, BASE.y, BASE.z);
  camera.lookAt(0, BASE.look, 0);

  // ---------- textures ----------
  function glowTexture() {
    const s = 128, c = document.createElement('canvas'); c.width = c.height = s;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.25, 'rgba(255,255,255,0.55)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g; x.fillRect(0, 0, s, s);
    return new THREE.CanvasTexture(c);
  }
  const GLOW = glowTexture();

  // animated gradient background
  const bgC = document.createElement('canvas'); bgC.width = 4; bgC.height = 256;
  const bgX = bgC.getContext('2d');
  const bgTex = new THREE.CanvasTexture(bgC);
  scene.background = bgTex;
  function updateBg(t) {
    const h = (t * 5) % 360;
    const g = bgX.createLinearGradient(0, 0, 0, 256);
    g.addColorStop(0, `hsl(${h|0}, 60%, 7%)`);
    g.addColorStop(0.55, `hsl(${(h+34)%360|0}, 65%, 13%)`);
    g.addColorStop(1, `hsl(${(h+70)%360|0}, 70%, 20%)`);
    bgX.fillStyle = g; bgX.fillRect(0, 0, 4, 256);
    bgTex.needsUpdate = true;
  }

  // ---------- lights ----------
  scene.add(new THREE.AmbientLight(0x8a93c8, 0.95));
  const key = new THREE.PointLight(0xffffff, 0.7); key.position.set(5, 12, 8); scene.add(key);
  const rim = new THREE.PointLight(0xff5ba0, 0.5); rim.position.set(-6, 4, 4); scene.add(rim);

  // ---------- cube boundary + floor grid ----------
  const boxGeo = new THREE.BoxGeometry(HW * 2, CUBE_H, HW * 2);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(boxGeo),
    new THREE.LineBasicMaterial({ color: EDGE_COLOR, transparent: true, opacity: 0.35 })
  );
  edges.position.y = CUBE_H / 2; scene.add(edges);

  const grid = new THREE.GridHelper(HW * 2, 12, EDGE_COLOR, 0x2a2f55);
  grid.material.transparent = true; grid.material.opacity = 0.3; grid.position.y = 0.005;
  scene.add(grid);
  // brighter floor outline
  const fl = new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-HW,0.01,-HW), new THREE.Vector3(HW,0.01,-HW),
      new THREE.Vector3(HW,0.01,HW), new THREE.Vector3(-HW,0.01,HW)]),
    new THREE.LineBasicMaterial({ color: EDGE_COLOR, transparent: true, opacity: 0.6 })
  );
  scene.add(fl);

  function haloFor(color, scale) {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW, color, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.6 }));
    s.scale.set(scale, scale, scale);
    return s;
  }

  // ---------- player ball ----------
  const player = new THREE.Mesh(new THREE.SphereGeometry(PR, 40, 28),
    new THREE.MeshStandardMaterial({ color: PLAYER_COLOR, emissive: PLAYER_COLOR,
      emissiveIntensity: 0.55, roughness: 0.25, metalness: 0.1 }));
  player.add(haloFor(PLAYER_COLOR, PR * 3.4));
  scene.add(player);
  let px = 0, pz = 0, ptx = 0, ptz = 0;
  const pvel = new THREE.Vector3();

  // ---------- small ball ----------
  const ball = new THREE.Mesh(new THREE.SphereGeometry(SR, 32, 24),
    new THREE.MeshStandardMaterial({ color: BALL_COLOR, emissive: BALL_COLOR,
      emissiveIntensity: 0.75, roughness: 0.2, metalness: 0.1 }));
  ball.add(haloFor(BALL_COLOR, SR * 3.6));
  scene.add(ball);
  const pos = new THREE.Vector3(0, CUBE_H + 2, 0);
  const vel = new THREE.Vector3();

  // landing marker on the floor
  const marker = new THREE.Mesh(new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map: GLOW, color: BALL_COLOR, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0 }));
  marker.rotation.x = -Math.PI / 2; marker.position.y = 0.03; scene.add(marker);

  // ---------- particle trail ----------
  const TRAIL = reduced ? 0 : 34;
  const trail = [], trailPos = [];
  for (let i = 0; i < TRAIL; i++) {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: GLOW, color: BALL_COLOR,
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0 }));
    s.visible = false; scene.add(s); trail.push(s);
  }

  // ---------- state ----------
  const S = { START: 0, PLAY: 1, OVER: 2 };
  let state = S.START, score = 0, best = 0, scorePop = 0, overTimer = 0;

  const ground = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const rc = new THREE.Raycaster(); const ndc = new THREE.Vector2(); const hit = new THREE.Vector3();
  function moveTo(cx, cy) {
    ndc.x = (cx / innerWidth) * 2 - 1; ndc.y = -(cy / innerHeight) * 2 + 1;
    rc.setFromCamera(ndc, camera);
    if (rc.ray.intersectPlane(ground, hit)) {
      ptx = Math.max(-HW + PR, Math.min(HW - PR, hit.x));
      ptz = Math.max(-HW + PR, Math.min(HW - PR, hit.z));
    }
  }
  function onMove(e) { if (state !== S.PLAY) return; const t = e.touches ? e.touches[0] : e; moveTo(t.clientX, t.clientY); }
  function onDown(e) {
    e.preventDefault(); audioInit();
    if (state === S.START) start();
    else if (state === S.OVER && overTimer <= 0) start();
    if (state === S.PLAY) onMove(e);
  }
  renderer.domElement.addEventListener('pointerdown', onDown, { passive: false });
  renderer.domElement.addEventListener('pointermove', onMove, { passive: false });
  addEventListener('keydown', (e) => {
    const s = HW * 0.16;
    if (e.key === 'ArrowLeft') ptx = Math.max(-HW + PR, ptx - s);
    else if (e.key === 'ArrowRight') ptx = Math.min(HW - PR, ptx + s);
    else if (e.key === 'ArrowUp') ptz = Math.max(-HW + PR, ptz - s);
    else if (e.key === 'ArrowDown') ptz = Math.min(HW - PR, ptz + s);
    else if (e.key === ' ' || e.key === 'Enter') { audioInit(); if (state !== S.PLAY) start(); }
  });
  addEventListener('resize', resize);
  function resize() {
    renderer.setSize(innerWidth, innerHeight, false);
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  }

  // ---------- audio ----------
  let actx = null, muted = false;
  function audioInit(){ if(!actx){ try{ actx = new (AudioContext||webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
  function blip(f, d, type){ if(!actx||muted) return; const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.16,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d); }
  document.getElementById('mute').onclick = () => { muted=!muted; const b=document.getElementById('mute');
    b.innerHTML = muted?'&#8416;':'&#9834;'; b.style.opacity = muted?0.55:1; };

  // ---------- ui ----------
  const elScore=document.getElementById('score'), elStart=document.getElementById('start'), elOver=document.getElementById('over');
  const show=(el,on)=>el.style.display=on?'':'none';
  function start(){
    score=0; elScore.textContent='0'; scorePop=0; overTimer=0;
    px=pz=ptx=ptz=0; player.position.set(0,PR,0); pvel.set(0,0,0);
    pos.set((Math.random()-0.5)*2, CUBE_H+1.5, (Math.random()-0.5)*2);
    vel.set((Math.random()-0.5)*3, -2, (Math.random()-0.5)*3);
    trailPos.length=0;
    state=S.PLAY; show(elStart,false); show(elOver,false); show(elScore,true);
  }
  function over(){ state=S.OVER; overTimer=0.55; best=Math.max(best,score);
    document.getElementById('finalScore').textContent=score;
    document.getElementById('bestScore').textContent='Best '+best; blip(150,0.35,'triangle'); }

  function bounce(n){
    const vn = (vel.x-pvel.x)*n.x + (vel.y-pvel.y)*n.y + (vel.z-pvel.z)*n.z;
    if (vn < 0) { vel.x -= (1+E)*vn*n.x; vel.y -= (1+E)*vn*n.y; vel.z -= (1+E)*vn*n.z; }
    if (vel.y < MINUP) vel.y = MINUP;             // guarantee a save lifts it
    const sp = vel.length(); if (sp > MAXSPD) vel.multiplyScalar(MAXSPD/sp);
    pos.copy(player.position).addScaledVector(n, PR + SR + 0.001);
    score++; elScore.textContent = score; scorePop = 1;
    blip(420 + Math.min(score,30)*10, 0.10, 'sine');
  }

  // ---------- loop ----------
  let last = performance.now(), tSec = 0;
  function tick(now){
    let dt = Math.min((now-last)/1000, 0.05); last = now; tSec += dt;
    updateBg(tSec);
    edges.material.opacity = 0.28 + 0.12*Math.sin(tSec*1.5);
    if (scorePop>0){ scorePop=Math.max(0,scorePop-dt*3); elScore.style.transform=`scale(${1+scorePop*0.18})`; }

    // player follow + velocity (for momentum transfer)
    const ox=px, oz=pz;
    px += (ptx-px)*Math.min(1,dt*16); pz += (ptz-pz)*Math.min(1,dt*16);
    player.position.set(px, PR, pz);
    if (dt>0){ pvel.set((px-ox)/dt, 0, (pz-oz)/dt); }
    const psp = Math.hypot(pvel.x,pvel.z); if (psp>26){ pvel.multiplyScalar(26/psp); }

    if (state===S.PLAY){
      vel.y -= G*dt;
      pos.addScaledVector(vel, dt);
      // horizontal cube walls (extend infinitely upward)
      if (pos.x < -HW+SR){ pos.x=-HW+SR; vel.x=Math.abs(vel.x)*WALL_E; }
      if (pos.x >  HW-SR){ pos.x= HW-SR; vel.x=-Math.abs(vel.x)*WALL_E; }
      if (pos.z < -HW+SR){ pos.z=-HW+SR; vel.z=Math.abs(vel.z)*WALL_E; }
      if (pos.z >  HW-SR){ pos.z= HW-SR; vel.z=-Math.abs(vel.z)*WALL_E; }
      // collision with player ball
      const dx=pos.x-player.position.x, dy=pos.y-player.position.y, dz=pos.z-player.position.z;
      const dist=Math.hypot(dx,dy,dz);
      if (dist <= SR+PR && dist>0.0001){ bounce(new THREE.Vector3(dx/dist,dy/dist,dz/dist)); }
      // miss -> floor
      else if (pos.y - SR <= 0){ pos.y=SR; over(); }
    } else if (state===S.OVER){
      if (overTimer>0){ overTimer-=dt; if(overTimer<=0) show(elOver,true); }
    } else { // START idle bob
      pos.set(0, CUBE_H+1.5+Math.sin(now/600)*0.25, 0);
    }
    ball.position.copy(pos);

    // landing marker
    const hgt = Math.max(0, pos.y);
    marker.position.set(pos.x, 0.03, pos.z);
    const ms = SR*2.4 + hgt*0.12; marker.scale.set(ms, ms, ms);
    marker.material.opacity = state===S.PLAY ? Math.min(0.5, 0.12+hgt*0.04) : 0;

    // particle trail
    if (TRAIL){
      if (state===S.PLAY){ trailPos.unshift(pos.clone()); if(trailPos.length>TRAIL) trailPos.pop(); }
      else { trailPos.length=0; }
      for (let i=0;i<TRAIL;i++){ const s=trail[i];
        if (i<trailPos.length){ s.visible=true; s.position.copy(trailPos[i]);
          const f=1-i/TRAIL; s.material.opacity=0.55*f*f; const sc=SR*1.7*f+0.05; s.scale.set(sc,sc,sc); }
        else s.visible=false; }
    }

    // dynamic camera: pull back & up when the ball flies above the cube
    const extra = Math.max(0, pos.y - CUBE_H*0.85);
    const tgtY = BASE.y + extra*0.55, tgtZ = BASE.z + extra*0.5, tgtL = BASE.look + extra*0.5;
    camera.position.x += (0 - camera.position.x)*Math.min(1,dt*3);
    camera.position.y += (tgtY - camera.position.y)*Math.min(1,dt*3);
    camera.position.z += (tgtZ - camera.position.z)*Math.min(1,dt*3);
    camera.lookAt(0, tgtL, 0);

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  resize();
  requestAnimationFrame((t)=>{ last=t; tick(t); });
})();
</script>
</body>
</html>
